<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Plataforma Emoji - Mario Style</title>
<style>
  :root{
    --ui-bg: rgba(0,0,0,0.35);
    --ui-blur: blur(10px);
  }
  *{box-sizing:border-box;user-select:none;-webkit-user-select:none;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:#87CEEB;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Helvetica, Arial, sans-serif;
    overscroll-behavior:none;
    touch-action:none;
    overflow:hidden;
  }
  #game{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    background:linear-gradient(#6bb8ff 0%, #bfe4ff 60%, #d7f0ff 100%);
  }
  #hud{
    position:fixed;
    top:12px;
    left:12px;
    display:flex;
    gap:12px;
    align-items:center;
    z-index:10;
    padding:10px 14px;
    background:var(--ui-bg);
    backdrop-filter:var(--ui-blur);
    border-radius:16px;
    color:#fff;
    font-weight:700;
    font-size:20px;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }
  #hud .item{
    display:flex;
    align-items:center;
    gap:6px;
    text-shadow:0 2px 4px rgba(0,0,0,0.4);
  }
  #hint{
    position:fixed;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    background:var(--ui-bg);
    backdrop-filter:var(--ui-blur);
    color:#fff;
    padding:8px 14px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    opacity:.9;
  }
  #controls{
    position:fixed;
    inset:auto 0 0 0;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    padding:20px;
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    z-index:10;
    pointer-events:none;
  }
  .pad{
    display:flex;
    gap:14px;
    pointer-events:auto;
  }
  .btn{
    width:72px;
    height:72px;
    border-radius:50%;
    border:none;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.6));
    backdrop-filter:blur(8px);
    box-shadow:0 8px 20px rgba(0,0,0,0.25), inset 0 2px 4px rgba(255,255,255,0.7);
    font-size:28px;
    font-weight:900;
    color:#222;
    touch-action:none;
    pointer-events:auto;
    transition:transform .05s;
  }
  .btn:active{
    transform:scale(0.94);
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,1), rgba(255,255,255,0.7));
  }
  #btn-jump{
    width:88px;
    height:88px;
    font-size:32px;
    background:radial-gradient(circle at 30% 30%, #fff8c6, #ffd54a);
  }
  #overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:20;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(6px);
    color:#fff;
    text-align:center;
    padding:24px;
  }
  #overlay[hidden]{display:none;}
  .panel{
    background:linear-gradient(180deg, #1e3a8a, #1e40af);
    border-radius:24px;
    padding:32px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    max-width:420px;
    width:100%;
    border:2px solid rgba(255,255,255,0.15);
  }
  .panel h1{
    margin:0 0 10px;
    font-size:42px;
    letter-spacing:1px;
  }
  .panel p{
    margin:0 0 20px;
    font-size:18px;
    opacity:.9;
  }
  .panel button{
    font-size:18px;
    font-weight:800;
    padding:14px 22px;
    border-radius:14px;
    border:none;
    background:#ffce2b;
    color:#1a1a1a;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    cursor:pointer;
  }
  .panel button:active{transform:scale(0.97);}
  @media (min-width:900px){
    .btn{width:64px;height:64px}
    #btn-jump{width:76px;height:76px}
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="item" id="hearts">❤️❤️❤️</div>
  <div class="item" id="coins">🪙 0</div>
</div>
<div id="hint">← → mover • ESPAÇO / ▲ pular</div>

<div id="controls">
  <div class="pad left">
    <button class="btn" id="btn-left" aria-label="Esquerda">◀</button>
    <button class="btn" id="btn-right" aria-label="Direita">▶</button>
  </div>
  <div class="pad right">
    <button class="btn" id="btn-jump" aria-label="Pular">▲</button>
  </div>
</div>

<div id="overlay" hidden>
  <div class="panel">
    <h1 id="overlay-title">Você Venceu!</h1>
    <p id="overlay-text">Moedas coletadas: 0</p>
    <button id="overlay-btn">Jogar Novamente</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  const WORLD_WIDTH = 3000;
  const WORLD_HEIGHT = 600;
  const GROUND_Y = 550;
  const GRAVITY = 0.68;
  const JUMP_VEL = -17;
  const MOVE_SPEED = 4.6;
  const FRICTION = 0.82;

  let viewW = 0, viewH = 0;
  function resize(){
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    canvas.width = viewW * dpr;
    canvas.height = viewH * dpr;
    canvas.style.width = viewW + 'px';
    canvas.style.height = viewH + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Input
  const input = {left:false, right:false, jump:false};
  const keys = {};
  window.addEventListener('keydown', e=>{
    if(['ArrowLeft','ArrowRight',' ','a','d'].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
    updateInput();
  });
  window.addEventListener('keyup', e=>{
    keys[e.key] = false;
    updateInput();
  });
  function updateInput(){
    input.left = keys['ArrowLeft'] || keys['a'];
    input.right = keys['ArrowRight'] || keys['d'];
    input.jump = keys[' '] || keys['Space'] || keys['ArrowUp'] || keys['w'];
  }

  // Touch controls
  function bindBtn(id, prop){
    const el = document.getElementById(id);
    const set = v => { input[prop] = v; };
    el.addEventListener('pointerdown', e=>{
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      set(true);
    });
    el.addEventListener('pointerup', e=>{
      e.preventDefault();
      set(false);
    });
    el.addEventListener('pointercancel', ()=>set(false));
    el.addEventListener('pointerleave', ()=>set(false));
    el.addEventListener('contextmenu', e=>e.preventDefault());
  }
  bindBtn('btn-left','left');
  bindBtn('btn-right','right');
  bindBtn('btn-jump','jump');

  // Game objects
  const platforms = [
    {x:350, y:450, w:200, h:20},
    {x:650, y:370, w:180, h:20},
    {x:950, y:450, w:200, h:20},
    {x:1250, y:340, w:180, h:20},
    {x:1550, y:460, w:220, h:20},
    {x:1850, y:360, w:180, h:20},
    {x:2150, y:470, w:200, h:20},
    {x:2450, y:380, w:180, h:20},
  ];

  const coins = [];
  platforms.forEach(p=>{
    coins.push({x:p.x + p.w*0.3, y:p.y - 30, r:12, collected:false, bob:Math.random()*Math.PI*2});
    coins.push({x:p.x + p.w*0.7, y:p.y - 30, r:12, collected:false, bob:Math.random()*Math.PI*2});
  });
  // ground coins
  for(let i=0;i<6;i++) coins.push({x:400+i*400, y:GROUND_Y-30, r:12, collected:false, bob:0});

  const enemies = [];
  function spawnEnemy(x, y, patrol){
    enemies.push({x, y, w:36, h:28, vx:1.4, dir:1, patrol, alive:true, squish:0});
  }
  spawnEnemy(700, GROUND_Y-28, {min:600, max:880});
  spawnEnemy(1300, GROUND_Y-28, {min:1200, max:1500});
  spawnEnemy(1000, platforms[2].y-28, {min:platforms[2].x, max:platforms[2].x+platforms[2].w-36});
  spawnEnemy(1900, platforms[5].y-28, {min:platforms[5].x, max:platforms[5].x+platforms[5].w-36});
  spawnEnemy(2200, GROUND_Y-28, {min:2100, max:2400});

  const flag = {x:2850, y:GROUND_Y-180, w:20, h:180};

  const clouds = [];
  for(let i=0;i<8;i++){
    clouds.push({
      x: Math.random()*WORLD_WIDTH,
      y: 60 + Math.random()*120,
      s: 0.6 + Math.random()*0.8,
      k: 0.15 + Math.random()*0.25
    });
  }

  const player = {
    x: 100, y: GROUND_Y-50,
    w: 38, h: 48,
    vx:0, vy:0,
    onGround:false,
    hearts:3,
    coins:0,
    inv:0,
    facing:1,
    dead:false,
    win:false,
    startTime: performance.now()
  };

  const camera = {x:0, y:0};

  const hudHearts = document.getElementById('hearts');
  const hudCoins = document.getElementById('coins');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayText = document.getElementById('overlay-text');
  const overlayBtn = document.getElementById('overlay-btn');

  overlayBtn.onclick = ()=> startGame();

  function startGame(){
    player.x = 100; player.y = GROUND_Y-50;
    player.vx = 0; player.vy = 0;
    player.hearts = 3; player.coins = 0;
    player.inv = 0; player.dead = false; player.win = false;
    player.startTime = performance.now();
    enemies.forEach(e=>{ e.alive=true; e.squish=0; });
    coins.forEach(c=>c.collected=false);
    overlay.hidden = true;
    hudHearts.textContent = '❤️'.repeat(player.hearts);
    hudCoins.textContent = '🪙 0';
  }

  function rectIntersect(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(32, now - last);
    last = now;
    if(!player.dead && !player.win) update(dt/16.666);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    // input
    let ax = 0;
    if(input.left) ax -= MOVE_SPEED;
    if(input.right) ax += MOVE_SPEED;
    player.vx += (ax - player.vx) * 0.25;
    if(!input.left && !input.right) player.vx *= FRICTION;

    // jump
    if(input.jump && player.onGround){
      player.vy = JUMP_VEL;
      player.onGround = false;
    }

    // gravity
    player.vy += GRAVITY * dt;
    if(player.vy > 20) player.vy = 20;

    // integrate
    let px = player.x, py = player.y;
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // world bounds
    if(player.x < 0) player.x = 0;
    if(player.x + player.w > WORLD_WIDTH) player.x = WORLD_WIDTH - player.w;

    // collisions
    player.onGround = false;
    const playerRect = {x:player.x, y:player.y, w:player.w, h:player.h};

    // ground
    if(player.y + player.h > GROUND_Y){
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    // platforms
    for(const p of platforms){
      if(rectIntersect(playerRect, {...p, h:p.h+1})){
        // from top
        if(px + player.w > p.x && px < p.x + p.w && py + player.h <= p.y && player.y + player.h >= p.y){
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
        // from bottom
        else if(px + player.w > p.x && px < p.x + p.w && py >= p.y + p.h && player.y < p.y + p.h){
          player.y = p.y + p.h;
          player.vy = 0;
        }
        // sides
        else if(py + player.h > p.y && py < p.y + p.h){
          if(px + player.w <= p.x && player.x + player.w > p.x){
            player.x = p.x - player.w;
            player.vx = 0;
          } else if(px >= p.x + p.w && player.x < p.x + p.w){
            player.x = p.x + p.w;
            player.vx = 0;
          }
        }
      }
    }

    // facing
    if(player.vx > 0.2) player.facing = 1;
    else if(player.vx < -0.2) player.facing = -1;

    // enemies
    for(const e of enemies){
      if(!e.alive) continue;
      e.x += e.vx * e.dir * dt;
      if(e.x < e.patrol.min){ e.x = e.patrol.min; e.dir = 1; }
      if(e.x + e.w > e.patrol.max){ e.x = e.patrol.max - e.w; e.dir = -1; }

      const eRect = {x:e.x, y:e.y, w:e.w, h:e.h};
      if(rectIntersect(playerRect, eRect) && player.inv <= 0){
        // stomp?
        const stomping = player.vy > 0 && (player.y + player.h - e.y) < 28;
        if(stomping){
          e.alive = false;
          e.squish = 1;
          player.vy = JUMP_VEL * 0.6;
          player.coins += 1;
        } else {
          // damage
          player.hearts -= 1;
          player.inv = 90;
          player.vx = (player.x < e.x ? -6 : 6);
          player.vy = -8;
          hudHearts.textContent = '❤️'.repeat(Math.max(0, player.hearts));
          if(player.hearts <= 0){
            gameOver();
          }
        }
      }
    }

    // coins
    for(const c of coins){
      if(c.collected) continue;
      c.bob += 0.08 * dt;
      const cx = c.x;
      const cy = c.y + Math.sin(c.bob)*4;
      const dx = (player.x + player.w/2) - cx;
      const dy = (player.y + player.h/2) - cy;
      if(dx*dx + dy*dy < (c.r + player.w*0.4)**2){
        c.collected = true;
        player.coins += 1;
        hudCoins.textContent = '🪙 ' + player.coins;
      }
    }

    // flag win
    if(player.x + player.w > flag.x + 10){
      winGame();
    }

    // fall death
    if(player.y > WORLD_HEIGHT + 100){
      gameOver();
    }

    if(player.inv > 0) player.inv -= dt;

    // camera
    const targetX = player.x + player.w/2 - viewW/2;
    camera.x += (targetX - camera.x) * 0.12;
    camera.x = Math.max(0, Math.min(WORLD_WIDTH - viewW, camera.x));
  }

  function gameOver(){
    if(player.dead) return;
    player.dead = true;
    overlay.hidden = false;
    overlayTitle.textContent = 'Fim de Jogo';
    overlayText.textContent = `Moedas: ${player.coins} • Tente novamente!`;
    overlayBtn.textContent = 'Jogar Novamente';
  }

  function winGame(){
    if(player.win) return;
    player.win = true;
    const time = ((performance.now() - player.startTime)/1000).toFixed(1);
    overlay.hidden = false;
    overlayTitle.textContent = 'Você Venceu!';
    overlayText.textContent = `Moedas: ${player.coins} • Tempo: ${time}s`;
    overlayBtn.textContent = 'Jogar Novamente';
  }

  // Rendering helpers
  function drawCloud(x,y,s){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s,s);
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(0,0,22,0,Math.PI*2);
    ctx.arc(28,8,18,0,Math.PI*2);
    ctx.arc(-24,10,16,0,Math.PI*2);
    ctx.arc(0,12,20,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlatform(p){
    const x = p.x - camera.x;
    const y = p.y;
    ctx.save();
    ctx.translate(x,y);
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(4,4,p.w,p.h);
    // body
    const grad = ctx.createLinearGradient(0,0,0,p.h);
    grad.addColorStop(0,'#8d6e63');
    grad.addColorStop(1,'#5d4037');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,p.w,p.h);
    // top grass
    ctx.fillStyle='#7cb342';
    ctx.fillRect(0,0,p.w,6);
    // highlights
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(0,0,p.w,2);
    ctx.restore();
  }

  function drawCoin(c){
    if(c.collected) return;
    const x = c.x - camera.x;
    const y = c.y + Math.sin(c.bob)*4;
    ctx.save();
    ctx.translate(x,y);
    const s = 1 + Math.sin(c.bob*2)*0.05;
    ctx.scale(s,1);
    ctx.fillStyle='#ffca28';
    ctx.beginPath();
    ctx.arc(0,0,c.r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#f57c00';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,c.r-3,0,Math.PI*2);
    ctx.stroke();
    ctx.fillStyle='#fff8e1';
    ctx.font='bold 14px system-ui';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('¢',0,1);
    ctx.restore();
  }

  function drawEnemy(e){
    if(!e.alive) return;
    const x = e.x - camera.x;
    const y = e.y;
    ctx.save();
    ctx.translate(x,y);
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(e.w/2, e.h, e.w*0.4, 6, 0,0,Math.PI*2);
    ctx.fill();
    // shell
    const grad = ctx.createLinearGradient(0,0,0,e.h);
    grad.addColorStop(0,'#66bb6a');
    grad.addColorStop(1,'#2e7d32');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(0,4,e.w,e.h-4,12);
    ctx.fill();
    // eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(10,10,5,0,Math.PI*2);
    ctx.arc(26,10,5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.arc(11+e.dir,11,2.2,0,Math.PI*2);
    ctx.arc(27+e.dir,11,2.2,0,Math.PI*2);
    ctx.fill();
    // mouth
    ctx.strokeStyle='#1b5e20';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(8,20);
    ctx.lineTo(28,20);
    ctx.stroke();
    ctx.restore();
  }

  function drawFlag(){
    const x = flag.x - camera.x;
    const y = flag.y;
    ctx.save();
    ctx.translate(x,y);
    // pole
    ctx.fillStyle='#e0e0e0';
    ctx.fillRect(0,0,8,flag.h);
    // flag
    ctx.fillStyle='#e53935';
    ctx.beginPath();
    ctx.moveTo(8,20);
    ctx.lineTo(70,40);
    ctx.lineTo(8,60);
    ctx.closePath();
    ctx.fill();
    // top ball
    ctx.fillStyle='#ffd54f';
    ctx.beginPath();
    ctx.arc(4,0,10,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer(){
    const x = player.x - camera.x;
    const y = player.y;
    ctx.save();
    ctx.translate(x + player.w/2, y + player.h/2);
    ctx.scale(player.facing,1);

    // shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, player.h/2+6, player.w*0.45, 7,0,0,Math.PI*2);
    ctx.fill();

    // blink when inv
    if(player.inv > 0 && Math.floor(player.inv/5)%2===0){
      ctx.globalAlpha = 0.4;
    }

    // body head
    ctx.fillStyle='#ffeb3b';
    ctx.beginPath();
    ctx.arc(0,-4,20,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#fbc02d';
    ctx.lineWidth=2;
    ctx.stroke();

    // cap
    ctx.fillStyle='#e53935';
    ctx.beginPath();
    ctx.arc(0,-10,20,Math.PI,Math.PI*2);
    ctx.fill();
    // brim
    ctx.fillStyle='#b71c1c';
    ctx.beginPath();
    ctx.ellipse(0, -8, 24, 6, 0,0,Math.PI*2);
    ctx.fill();
    // cap button
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(0,-26,4,0,Math.PI*2);
    ctx.fill();

    // eyes
    ctx.fillStyle='#212121';
    ctx.beginPath();
    ctx.arc(-7,-6,3,0,Math.PI*2);
    ctx.arc(7,-6,3,0,Math.PI*2);
    ctx.fill();
    // smile
    ctx.strokeStyle='#212121';
    ctx.lineWidth=2.5;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(0,-2,9,0.2,Math.PI-0.2);
    ctx.stroke();

    ctx.restore();
  }

  function drawGround(){
    const y = GROUND_Y;
    // base
    ctx.fillStyle='#6d4c41';
    ctx.fillRect(-camera.x, y, WORLD_WIDTH, WORLD_HEIGHT - y);
    // top grass
    ctx.fillStyle='#8bc34a';
    ctx.fillRect(-camera.x, y, WORLD_WIDTH, 24);
    // hills
    ctx.fillStyle='#7cb342';
    ctx.beginPath();
    let step = 80;
    ctx.moveTo(-camera.x, y+24);
    for(let x=0; x<=WORLD_WIDTH+step; x+=step){
      const hx = x - camera.x;
      const hy = y + 24 + Math.sin((x)*0.01)*12 + Math.cos(x*0.005)*8;
      ctx.lineTo(hx, hy);
    }
    ctx.lineTo(WORLD_WIDTH - camera.x, WORLD_HEIGHT);
    ctx.lineTo(-camera.x, WORLD_HEIGHT);
    ctx.closePath();
    ctx.fill();
  }

  function render(){
    ctx.clearRect(0,0,viewW,viewH);

    // sky gradient already via CSS, draw clouds
    for(const c of clouds){
      const cx = c.x - camera.x * c.k;
      // wrap
      let drawX = cx % (WORLD_WIDTH + 400);
      if(drawX < -200) drawX += WORLD_WIDTH + 400;
      drawCloud(drawX, c.y, c.s);
    }

    drawGround();

    for(const p of platforms) drawPlatform(p);
    for(const c of coins) drawCoin(c);
    for(const e of enemies) drawEnemy(e);
    drawFlag();
    drawPlayer();

    // world end marker
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(WORLD_WIDTH - camera.x, 0, 4, WORLD_HEIGHT);
  }

  // start
  startGame();
  requestAnimationFrame(loop);
})();
</script>
